<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f766e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <link rel="icon" href="%BASE_URL%icons/icon.svg" type="image/svg+xml" />
    <title>Rimedi</title>
    <style>
      html,
      body {
        min-height: 100%;
        margin: 0;
        background: #ffffff;
      }

      #root {
        min-height: 100dvh;
      }

      .startupSplash {
        position: fixed;
        inset: 0;
        z-index: 100;
        display: grid;
        min-height: 100dvh;
        box-sizing: border-box;
        padding: max(32px, env(safe-area-inset-top)) 24px max(32px, env(safe-area-inset-bottom));
        place-content: center;
        justify-items: center;
        gap: 8px;
        color: #64748b;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-align: center;
        background: #ffffff;
        transition: opacity 360ms ease, transform 360ms ease, visibility 360ms;
      }

      .startupSplash.isLeaving {
        visibility: hidden;
        opacity: 0;
        transform: translateY(-8px) scale(0.985);
      }

      #root.appEntering {
        animation: applicationEnter 420ms ease-out both;
      }

      .startupLogo {
        color: #0f766e;
        font-size: clamp(2.35rem, 12vw, 3.5rem);
        font-weight: 650;
        letter-spacing: -0.04em;
        animation: startupEnter 420ms ease-out both;
      }

      .startupTagline {
        font-size: 0.78rem;
        letter-spacing: 0.02em;
        animation: startupEnter 420ms 80ms ease-out both;
      }

      .startupLoader {
        position: relative;
        width: 42px;
        height: 3px;
        margin-top: 18px;
        overflow: hidden;
        border-radius: 999px;
        background: #dbe7e5;
      }

      .startupLoader::after {
        position: absolute;
        inset: 0;
        border-radius: inherit;
        background: #0f766e;
        content: "";
        transform: translateX(-100%);
        animation: startupProgress 1.1s ease-in-out infinite;
      }

      @keyframes startupEnter {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes startupProgress {
        50% { transform: translateX(35%); }
        100% { transform: translateX(100%); }
      }

      @keyframes applicationEnter {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @media (prefers-reduced-motion: reduce) {
        .startupLogo,
        .startupTagline,
        .startupLoader::after {
          animation: none;
        }

        .startupSplash {
          transition: none;
        }

        #root.appEntering {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <main id="startup-splash" class="startupSplash" aria-label="Uruchamianie Rimedi">
      <strong class="startupLogo">Rimedi</strong>
      <span class="startupTagline">Leki bez tajemnic</span>
      <span class="startupLoader" aria-hidden="true"></span>
    </main>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
