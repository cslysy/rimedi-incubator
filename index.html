<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f766e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="%BASE_URL%manifest.webmanifest" />
    <link rel="icon" href="%BASE_URL%icons/icon.svg" type="image/svg+xml" />
    <title>Rimedi</title>
    <style>
      html,
      body {
        min-height: 100%;
        margin: 0;
        background: #ffffff;
      }

      #root {
        min-height: 100dvh;
      }

      .startupSplash {
        position: fixed;
        inset: 0;
        z-index: 100;
        min-height: 100dvh;
        background: #ffffff;
        transition: opacity 260ms ease, visibility 260ms;
      }

      .startupSplash.isLeaving {
        visibility: hidden;
        opacity: 0;
      }

      #root.appEntering {
        animation: applicationEnter 420ms ease-out both;
      }

      #root.appIntro .searchBrand,
      #root.appIntro .searchInputWrap {
        opacity: 0;
      }

      #root.appIntro.isRevealing .searchBrand {
        animation: revealLogo 720ms 80ms cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      #root.appIntro.isRevealing .searchInputWrap {
        animation: revealSearch 760ms 620ms cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      @keyframes revealLogo {
        from { opacity: 0; transform: translateY(10px); filter: blur(3px); }
        to { opacity: 1; transform: translateY(0); filter: blur(0); }
      }

      @keyframes revealSearch {
        from { opacity: 0; transform: translateY(14px) scale(0.985); filter: blur(3px); }
        to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
      }

      @keyframes applicationEnter {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @media (prefers-reduced-motion: reduce) {
        .startupSplash {
          transition: none;
        }

        #root.appEntering,
        #root.appIntro.isRevealing .searchBrand,
        #root.appIntro.isRevealing .searchInputWrap {
          animation: none;
        }

        #root.appIntro .searchBrand,
        #root.appIntro .searchInputWrap {
          opacity: 1;
          transform: none;
          filter: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="startup-splash" class="startupSplash" aria-hidden="true"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
